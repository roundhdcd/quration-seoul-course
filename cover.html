<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quration Cover</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(160deg,#ffccd9 0%,#ffe2dc 50%,#ffd7c4 100%)}
  .cover{width:100vw;min-height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px;text-align:center}
  .deco{position:absolute;opacity:.55;font-size:30px}
  .d1{top:12%;left:11%}.d2{top:16%;right:12%;font-size:24px}
  .d3{bottom:16%;left:10%;font-size:24px}.d4{bottom:13%;right:12%}
  .q{font-size:18px;font-weight:800;color:#33303a;margin-bottom:18px;letter-spacing:1px}
  .main{font-size:48px;font-weight:900;color:#2a2630;line-height:1.25;letter-spacing:1px}
  .main .hl{color:#fff;background:#e8403c;padding:4px 18px;border-radius:16px;
    box-shadow:0 8px 22px rgba(232,64,60,.4);display:inline-block;margin-top:12px}
  .sub{font-size:17px;color:#8a5a55;margin-top:22px;font-weight:700;letter-spacing:.5px}
</style>
</head>
<body>
  <div class="cover">
    <span class="deco d1">🌸</span><span class="deco d2">✨</span>
    <span class="deco d3">🫶</span><span class="deco d4">🌷</span>
    <div class="q">Quration Korea</div>
    <div class="main">韩国太多选择？<br><span class="hl">我帮你做决定 🇰🇷</span></div>
    <div class="sub">在韩国 · 验证过的选择</div>
  </div>
</body>
</html>
