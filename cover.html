<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quration Cover</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(160deg,#ffd9e2 0%,#fff0ec 45%,#fde9df 100%)}
  .cover{width:100vw;min-height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 26px;text-align:center}
  .deco{position:absolute;font-size:26px;opacity:.5}
  .d1{top:14%;left:9%}.d2{top:18%;right:11%;font-size:22px}.d3{top:46%;right:6%}
  .d4{bottom:20%;left:7%;font-size:22px}.d5{bottom:15%;right:13%}
  /* 핵심 콘텐츠 — 화면 정중앙 밴드에 모음 (어디서 잘려도 보이게) */
  .badge{display:inline-block;background:#fff;color:#e23a5e;font-size:13px;font-weight:800;
    padding:6px 16px;border-radius:30px;margin-bottom:16px;box-shadow:0 3px 10px rgba(255,90,122,.18)}
  .main{font-size:42px;font-weight:900;color:#26222b;line-height:1.26;letter-spacing:.5px}
  .main .hl{color:#fff;background:#e34b46;padding:3px 14px;border-radius:13px;
    box-shadow:0 5px 16px rgba(227,75,70,.35);display:inline-block;margin-top:8px}
  .sub{font-size:16px;color:#7a5a52;margin-top:18px;line-height:1.55;font-weight:700}
  .handle{font-size:15px;color:#b5546a;font-weight:800;letter-spacing:.5px;margin-top:18px}
  .tags{position:absolute;bottom:6%;left:0;right:0;display:flex;flex-wrap:nowrap;justify-content:center;gap:5px;padding:0 10px}
  .tags span{background:rgba(255,255,255,.88);border:1px solid #ffd2dc;color:#9a5566;font-size:11.5px;font-weight:700;padding:5px 9px;border-radius:30px;white-space:nowrap}
</style>
</head>
<body>
  <div class="cover">
    <span class="deco d1">🌸</span><span class="deco d2">✨</span><span class="deco d3">🧴</span>
    <span class="deco d4">☕</span><span class="deco d5">🗼</span>
    <div class="badge">⏱ 3分钟出行程 · 不踩雷</div>
    <div class="main">韩国太多选择？<br><span class="hl">我帮你做决定 🫶</span></div>
    <div class="sub">在韩国 · 验证过的选择<br>你的韩国旅行决策助手</div>
    <div class="tags"><span>🍜 美食</span><span>☕ 咖啡</span><span>🏯 韩屋</span><span>🌃 夜景</span><span>💄 美妆</span></div>
    <div class="handle">Quration Korea</div>
  </div>
</body>
</html>
