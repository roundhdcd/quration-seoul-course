<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quration Cover</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(160deg,#ffccd9 0%,#ffe2dc 50%,#ffd7c4 100%)}
  .cover{width:100vw;min-height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:11vh 16px 0;text-align:center}
  .deco{position:absolute;opacity:.45;font-size:26px}
  .d1{top:6%;left:8%}.d2{top:8%;right:9%;font-size:22px}
  .d3{bottom:12%;left:9%;font-size:24px}.d4{bottom:9%;right:11%}
  .q{font-size:17px;font-weight:800;color:#33303a;margin-bottom:12px;letter-spacing:1.3px}
  .main{font-weight:900;color:#2a2630;line-height:1.2;letter-spacing:.5px}
  .main .l1{font-size:clamp(32px,10vw,46px);display:block}
  .main .hl{color:#fff;background:#e8403c;padding:5px 16px;border-radius:15px;white-space:nowrap;
    box-shadow:0 8px 20px rgba(232,64,60,.4);display:inline-block;margin-top:11px;font-size:clamp(30px,9.5vw,44px)}
  .sub{font-size:15px;color:#8a5a55;margin-top:16px;font-weight:700;letter-spacing:.5px}
</style>
</head>
<body>
  <div class="cover">
    <span class="deco d1">🌸</span><span class="deco d2">✨</span>
    <span class="deco d3">🫶</span><span class="deco d4">🌷</span>
    <div class="q">Quration Korea</div>
    <div class="main"><span class="l1">韩国太多选择？</span><span class="hl">我帮你做决定🇰🇷</span></div>
    <div class="sub">在韩国 · 验证过的选择</div>
  </div>
</body>
</html>
